[stage_01.boot_inputs]
os_name = "LevitateOS"
overlay_kind = "systemd"
required_services = ["sshd", "auditd"]

[stage_01.boot_inputs.rootfs_source]
kind = "recipe_rocky"
recipe_script = "distro-builder/recipes/rocky-stage01-rootfs.rhai"

# To use your own Stage 01 rootfs source, switch to:
# kind = "recipe_custom"
# recipe_script = "distro-builder/recipes/custom-stage01-rootfs.rhai"
# [stage_01.boot_inputs.rootfs_source.defines]
# CUSTOM_ROOTFS_DIR = "/absolute/path/to/your/rootfs"
