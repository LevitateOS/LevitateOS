  "recstrap",
  "recfstab",
  "recchroot",
  "sfdisk",
  "mkfs.ext4",
  "mount",
  "ip",
  "ping",
  "curl",
  "lspci",
  "lsusb",
  "smartctl",
  "hdparm",
  "vim",
  "less",
  "htop",
  "grep",
  "find",
]
