name: Epic
description: Cross-cutting migration or major backlog item
title: "epic: "
body:
  - type: dropdown
    id: owner
    attributes:
      label: Primary owner
      description: Choose one canonical owner path.
      options:
        - distro-builder
        - distro-contract
        - distro-spec
        - distro-variants/levitate
        - distro-variants/acorn
        - distro-variants/iuppiter
        - distro-variants/ralph
        - testing/install-tests
        - testing/fsdbg
        - testing/rootfs-tests
        - xtask
        - tools/recipe
        - tools/recab
        - docs/content
        - legacy-compat
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken, fragmented, or still stage-era?
      placeholder: The canonical path still relies on...
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the end state, not the implementation steps.
      placeholder: Canonical validation/reporting uses owner/ring/product vocabulary...
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: State what this issue does not include.
      placeholder: Do not change scenario build/consume boundaries...
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: Commands, tests, or observable conditions that prove completion.
      placeholder: |
        - cargo check -p ...
        - cargo test -p ...
        - canonical docs no longer teach ...
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related paths and docs
      description: Absolute minimum supporting references.
      placeholder: |
        distro-builder/docs/05_MIGRATION_RING_EXECUTION_MODEL.md
        distro-contract/src/validate.rs
        justfile
    validations:
      required: true
  - type: textarea
    id: child_issues
    attributes:
      label: Suggested child issues
      description: Optional initial decomposition.
      placeholder: |
        - #123
        - replace ...
        - update ...
