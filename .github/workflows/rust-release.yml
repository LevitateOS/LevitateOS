name: Rust Release

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        default: '.'
        type: string
      create-binary-artifact:
        description: 'Create tar.gz binary artifact (for binaries)'
        required: false
        default: false
        type: boolean
      create-rpm-artifact:
        description: 'Create RPM artifact with cargo-generate-rpm'
        required: false
        default: false
        type: boolean
      binary-name:
        description: 'Binary name for artifact (required if create-binary-artifact)'
        required: false
        default: ''
        type: string
      rpm-glob:
        description: 'Glob for generated RPM files relative to working-directory'
        required: false
        default: 'target/generate-rpm/*.rpm'
        type: string
      publish-to-crates-io:
        description: 'Publish to crates.io (for libraries only)'
        required: false
        default: false
        type: boolean
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP_TYPE="${{ github.event.inputs.version_bump || 'patch' }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch|*) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" Cargo.toml

      - run: cargo check

      - name: Commit version bump
        run: |
          git add Cargo.toml
          git add Cargo.lock 2>/dev/null || true
          git commit -m "chore: Bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Build release binary
        if: inputs.create-binary-artifact || inputs.create-rpm-artifact
        run: cargo build --release

      - name: Create artifact
        if: inputs.create-binary-artifact
        run: |
          tar -czvf ${{ inputs.binary-name }}-x86_64-linux.tar.gz \
            -C target/release ${{ inputs.binary-name }}

      - name: Install cargo-generate-rpm
        if: inputs.create-rpm-artifact
        run: cargo install cargo-generate-rpm

      - name: Build RPM artifact
        if: inputs.create-rpm-artifact
        run: cargo generate-rpm

      - name: Collect release files
        id: release_files
        shell: bash
        run: |
          files=()
          if [[ "${{ inputs.create-binary-artifact }}" == "true" ]]; then
            files+=("${{ inputs.binary-name }}-x86_64-linux.tar.gz")
          fi
          if [[ "${{ inputs.create-rpm-artifact }}" == "true" ]]; then
            shopt -s nullglob
            rpm_matches=( ${{ inputs.rpm-glob }} )
            shopt -u nullglob
            if [[ ${#rpm_matches[@]} -eq 0 ]]; then
              echo "No RPM artifacts matched '${{ inputs.rpm-glob }}'" >&2
              exit 1
            fi
            files+=("${rpm_matches[@]}")
          fi
          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.release_files.outputs.files }}

      - name: Publish to crates.io
        if: inputs.publish-to-crates-io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
